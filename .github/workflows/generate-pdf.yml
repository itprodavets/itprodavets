name: Generate PDF Resumes

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Install pandoc and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra fonts-noto fonts-noto-cjk

      - name: Clean and create output directory
        run: |
          rm -rf pdf
          mkdir -p pdf

      - name: Generate standard PDFs
        run: |
          for file in resume.en.md resume.ru.md projects.en.md projects.ru.md; do
            if [ -f "$file" ]; then
              echo "Converting $file..."
              pandoc "$file" \
                -o "pdf/${file%.md}.pdf" \
                --pdf-engine=xelatex \
                -V geometry:margin=0.5in \
                -V mainfont:"Noto Sans" \
                -V monofont:"Noto Sans Mono" \
                -V fontsize=9pt \
                -V linestretch=0.88 \
                -V colorlinks=true \
                -V linkcolor=blue \
                -V urlcolor=blue \
                -H <(echo '\usepackage{titlesec}\titlespacing*{\section}{0pt}{8pt}{4pt}\titlespacing*{\subsection}{0pt}{6pt}{3pt}\titlespacing*{\subsubsection}{0pt}{4pt}{2pt}\setlength{\parskip}{3pt}\setlength{\parindent}{0pt}\usepackage{enumitem}\setlist{nosep,leftmargin=1.2em}')
            fi
          done

      - name: Generate one-page backend resume PDFs
        run: |
          for file in resume-csharp-backend.md resume-csharp-backend.ru.md resume-lead-csharp-backend.md resume-lead-csharp-backend.ru.md resume-go-backend.md resume-go-backend.ru.md; do
            if [ -f "$file" ]; then
              echo "Converting $file (compact)..."
              pandoc "$file" \
                -o "pdf/${file%.md}.pdf" \
                --pdf-engine=xelatex \
                -V geometry:margin=0.4in \
                -V mainfont:"Noto Sans" \
                -V monofont:"Noto Sans Mono" \
                -V fontsize=8pt \
                -V linestretch=0.85 \
                -V colorlinks=true \
                -V linkcolor=blue \
                -V urlcolor=blue \
                -H <(echo '\usepackage{titlesec}\titlespacing*{\section}{0pt}{6pt}{3pt}\titlespacing*{\subsection}{0pt}{4pt}{2pt}\titlespacing*{\subsubsection}{0pt}{3pt}{1pt}\setlength{\parskip}{2pt}\setlength{\parindent}{0pt}\usepackage{enumitem}\setlist{nosep,leftmargin=1.2em}')
            fi
          done

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf/ --all
          git diff --staged --quiet || (git commit -m "Update PDF resumes" && git push)
