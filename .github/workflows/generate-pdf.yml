name: Generate PDF Resumes

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install git and Noto fonts
        run: apk add --no-cache git font-noto font-noto-cjk

      - name: Clean and create output directory
        run: |
          rm -rf pdf
          mkdir -p pdf

      - name: Generate standard PDFs
        run: |
          for file in resume.en.md resume.ru.md projects.en.md projects.ru.md; do
            if [ -f "$file" ]; then
              echo "Converting $file..."
              pandoc "$file" \
                -o "pdf/${file%.md}.pdf" \
                --pdf-engine=xelatex \
                -V geometry:margin=0.8in \
                -V mainfont:"Noto Sans" \
                -V monofont:"Noto Sans Mono" \
                -V fontsize=10pt \
                -V colorlinks=true \
                -V linkcolor=blue \
                -V urlcolor=blue
            fi
          done

      - name: Generate one-page backend resume PDFs
        run: |
          for file in resume-csharp-backend.md resume-csharp-backend.ru.md resume-lead-csharp-backend.md resume-lead-csharp-backend.ru.md resume-go-backend.md resume-go-backend.ru.md; do
            if [ -f "$file" ]; then
              echo "Converting $file (compact)..."
              pandoc "$file" \
                -o "pdf/${file%.md}.pdf" \
                --pdf-engine=xelatex \
                -V geometry:margin=0.5in \
                -V mainfont:"Noto Sans" \
                -V monofont:"Noto Sans Mono" \
                -V fontsize=8.5pt \
                -V linestretch=0.9 \
                -V colorlinks=true \
                -V linkcolor=blue \
                -V urlcolor=blue
            fi
          done

      - name: Commit and push PDFs
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf/ --all
          git diff --staged --quiet || (git commit -m "Update PDF resumes" && git push)
